# PM Digital Employee - Docker Compose Configuration
# 国有大型银行科技子公司项目管理部 - 项目经理数字员工系统
# 一键启动完整服务栈：PostgreSQL(pgvector) + Redis + RabbitMQ + FastAPI + Celery

services:
  # PostgreSQL数据库服务（含pgvector扩展）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm_password}
      POSTGRES_DB: ${POSTGRES_DB:-pm_digital_employee}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/var/lib/postgresql/backup
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/01-init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pm_user} -d ${POSTGRES_DB:-pm_digital_employee}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis缓存服务
  redis:
    image: redis:7.4-alpine
    container_name: pm_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-pm_redis_password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-pm_redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pm_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # RabbitMQ消息队列服务（Celery Broker）
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: pm_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pm_rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pm_rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-pm_vhost}
      RABBITMQ_NODE_TYPE: disc
      RABBITMQ_DISK_FREE_LIMIT: 1GB
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
      RABBITMQ_LOG_LEVEL: info
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"    # AMQP端口
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # Management UI端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # FastAPI应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
    container_name: pm_app
    restart: unless-stopped
    environment:
      # 应用配置
      APP_NAME: ${APP_NAME:-PM Digital Employee}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change_this_to_secure_secret_key_in_production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_WORKERS: ${APP_WORKERS:-4}

      # 数据库配置
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pm_user}:${POSTGRES_PASSWORD:-pm_password}@postgres:5432/${POSTGRES_DB:-pm_digital_employee}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}

      # Redis配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/0

      # RabbitMQ配置
      CELERY_BROKER_URL: pyamqp://${RABBITMQ_USER:-pm_rabbitmq}:${RABBITMQ_PASSWORD:-pm_rabbitmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-pm_vhost}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/1

      # 飞书配置
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}
      LARK_ENCRYPT_KEY: ${LARK_ENCRYPT_KEY:-}
      LARK_VERIFICATION_TOKEN: ${LARK_VERIFICATION_TOKEN:-}

      # LLM配置
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}

      # 安全配置
      SECURITY_ENABLE_INPUT_VALIDATION: ${SECURITY_ENABLE_INPUT_VALIDATION:-true}
      SECURITY_ENABLE_PROMPT_INJECTION_GUARD: ${SECURITY_ENABLE_PROMPT_INJECTION_GUARD:-true}
      SECURITY_ENABLE_DATA_MASKING: ${SECURITY_ENABLE_DATA_MASKING:-true}

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/var/log/pm_digital_employee}

      # 监控配置
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      METRICS_PORT: ${METRICS_PORT:-9090}
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      - app_logs:/var/log/pm_digital_employee
      - app_data:/app/data
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Celery Worker服务（异步任务执行）
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
    container_name: pm_celery_worker
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=100
      --time-limit=3600
      --soft-time-limit=3300
      --queues=default,report,notification,import
    environment:
      # 应用配置
      APP_NAME: ${APP_NAME:-PM Digital Employee}
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change_this_to_secure_secret_key_in_production}

      # 数据库配置
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pm_user}:${POSTGRES_PASSWORD:-pm_password}@postgres:5432/${POSTGRES_DB:-pm_digital_employee}

      # Redis配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/0

      # RabbitMQ配置
      CELERY_BROKER_URL: pyamqp://${RABBITMQ_USER:-pm_rabbitmq}:${RABBITMQ_PASSWORD:-pm_rabbitmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-pm_vhost}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/1

      # 飞书配置
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}

      # LLM配置
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4}
      LLM_API_KEY: ${LLM_API_KEY:-}

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - worker_logs:/var/log/pm_digital_employee
      - worker_data:/app/data
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Celery Beat服务（定时任务调度）
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
    container_name: pm_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=${LOG_LEVEL:-INFO}
      --schedule=/app/data/celerybeat-schedule
      --max-interval=60
    environment:
      # 应用配置
      APP_NAME: ${APP_NAME:-PM Digital Employee}
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change_this_to_secure_secret_key_in_production}

      # Redis配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/0

      # RabbitMQ配置
      CELERY_BROKER_URL: pyamqp://${RABBITMQ_USER:-pm_rabbitmq}:${RABBITMQ_PASSWORD:-pm_rabbitmq_password}@rabbitmq:5672/${RABBITMQ_VHOST:-pm_vhost}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-pm_redis_password}@redis:6379/1

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - beat_logs:/var/log/pm_digital_employee
      - beat_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/celerybeat-schedule || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pm_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# 数据卷定义
volumes:
  postgres_data:
    name: pm_postgres_data
    driver: local
  postgres_backup:
    name: pm_postgres_backup
    driver: local
  redis_data:
    name: pm_redis_data
    driver: local
  rabbitmq_data:
    name: pm_rabbitmq_data
    driver: local
  rabbitmq_log:
    name: pm_rabbitmq_log
    driver: local
  app_logs:
    name: pm_app_logs
    driver: local
  app_data:
    name: pm_app_data
    driver: local
  worker_logs:
    name: pm_worker_logs
    driver: local
  worker_data:
    name: pm_worker_data
    driver: local
  beat_logs:
    name: pm_beat_logs
    driver: local
  beat_data:
    name: pm_beat_data
    driver: local

# 网络定义
networks:
  pm_network:
    name: pm_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"