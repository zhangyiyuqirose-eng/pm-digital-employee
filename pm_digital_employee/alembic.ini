# PM Digital Employee - Alembic Configuration
# 项目经理数字员工系统 - 数据库迁移配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 版本文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# sys.path前缀（用于导入应用模块）
prepend_sys_path = .

# 版本路径分隔符
version_path_separator = os

# 输出编码
output_encoding = utf-8

# 数据库连接URL（从环境变量读取，由应用配置模块提供）
# 注意：使用同步驱动（psycopg2），因为Alembic不支持异步
sqlalchemy.url = postgresql://%(POSTGRES_USER)s:%(POSTGRES_PASSWORD)s@%(POSTGRES_HOST)s:%(POSTGRES_PORT)s/%(POSTGRES_DB)s

[post_write_hooks]
# 迁移脚本生成后执行的钩子

# 使用black格式化生成的迁移脚本
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S