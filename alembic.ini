# PM Digital Employee - Alembic Configuration
# 数据库迁移配置文件

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# 使用环境变量配置数据库URL
# 在生产环境中通过 DATABASE_URL 环境变量设置
# 格式: postgresql+asyncpg://user:pass@localhost/dbname
# 注意：Alembic需要同步驱动，使用postgresql://（不带asyncpg）
sqlalchemy.url = 

# 版本文件命名格式
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 迁移环境设置
revision_environment = true

[post_write_hooks]
# 格式化生成的迁移文件
hooks = ruff
ruff.type = module
ruff.module = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S