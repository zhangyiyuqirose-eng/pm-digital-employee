# PM Digital Employee - Docker Compose Configuration
# PM Digital Employee System - One-click full service stack

services:
  # PostgreSQL database service (with pgvector extension)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_password_123
      POSTGRES_DB: pm_digital_employee
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/01-init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm_user -d pm_digital_employee"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pm_network

  # Redis cache service
  redis:
    image: redis:7.4-alpine
    container_name: pm_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_123
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pm_network

  # RabbitMQ message queue service
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: pm_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pm_rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq_123
    ports:
      - "15672:5672"
      - "25672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - pm_network

  # FastAPI application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pm_app
    restart: unless-stopped
    environment:
      APP_NAME: PM Digital Employee
      APP_ENV: development
      APP_DEBUG: "true"
      APP_SECRET_KEY: dev_secret_key_change_in_production_32chars
      DB_ASYNC_URL: postgresql+asyncpg://pm_user:pm_password_123@postgres:5432/pm_digital_employee
      DB_URL: postgresql://pm_user:pm_password_123@postgres:5432/pm_digital_employee
      REDIS_URL: redis://:redis_123@redis:6379/0
      CELERY_BROKER_URL: pyamqp://pm_rabbitmq:rabbitmq_123@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://:redis_123@redis:6379/1
      LARK_APP_ID: ${LARK_APP_ID:-your_app_id}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-your_app_secret}
      LARK_ENCRYPT_KEY: ${LARK_ENCRYPT_KEY:-your_encrypt_key}
      LARK_VERIFICATION_TOKEN: ${LARK_VERIFICATION_TOKEN:-your_verification_token}
      LARK_API_DOMAIN: https://open.feishu.cn
      # LLM Configuration
      LLM_PROVIDER: openai
      LLM_MODEL_NAME: MiniMax-M2.5
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: https://www.finna.com.cn/v1
      LLM_TEMPERATURE: 0.7
      LLM_MAX_TOKENS: 4096
      LLM_INTENT_MODEL: MiniMax-M2.5
      LLM_INTENT_MAX_TOKENS: 1000
      LLM_INTENT_TEMPERATURE: 0.3
      LLM_OPENAI_API_KEY: ${LLM_OPENAI_API_KEY:-app-lvnmd1sdxoQMg7ck64eLskMv}
      LLM_OPENAI_API_BASE: https://www.finna.com.cn/v1
      LLM_OPENAI_MODEL: MiniMax-M2.5
      LOG_LEVEL: INFO
    ports:
      - "28000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pm_network

  # Celery Worker service
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pm_celery_worker
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=INFO
      --concurrency=2
    environment:
      DB_ASYNC_URL: postgresql+asyncpg://pm_user:pm_password_123@postgres:5432/pm_digital_employee
      DB_URL: postgresql://pm_user:pm_password_123@postgres:5432/pm_digital_employee
      REDIS_URL: redis://:redis_123@redis:6379/0
      CELERY_BROKER_URL: pyamqp://pm_rabbitmq:rabbitmq_123@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://:redis_123@redis:6379/1
      LARK_APP_ID: ${LARK_APP_ID:-your_app_id}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-your_app_secret}
      LARK_ENCRYPT_KEY: ${LARK_ENCRYPT_KEY:-your_encrypt_key}
      LARK_VERIFICATION_TOKEN: ${LARK_VERIFICATION_TOKEN:-your_verification_token}
      LOG_LEVEL: INFO
    volumes:
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/cmdline && grep -q celery /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pm_network

# Volume definitions
volumes:
  postgres_data:
    name: pm_postgres_data
  redis_data:
    name: pm_redis_data
  rabbitmq_data:
    name: pm_rabbitmq_data

# Network definitions
networks:
  pm_network:
    name: pm_network
    driver: bridge
